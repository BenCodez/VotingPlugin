####################################################################################################
# VotingPlugin – VoteShop Configuration (Shop.yml)
# Author: BenCodez
#
# This file controls the /vote shop GUI (VoteShop) and all purchasable items.
# Players spend vote points to buy rewards (items/commands/messages/etc).
#
# ─────────────────────────────────────────────────────────────────────────────
# 📑 Config Index (matches this file)
# ─────────────────────────────────────────────────────────────────────────────
#  • VoteShop (GUI settings)
#  • Shop (items for sale + category buttons)
#  • Categories (optional extra shop pages)
#  • ExtraItems (optional display-only items)
#  • ShopConfirmPurchase (confirmation GUI layout)
#
# ─────────────────────────────────────────────────────────────────────────────
# 🧠 Tips
# ─────────────────────────────────────────────────────────────────────────────
# • To disable an entire section, set it to {} or remove it.
# • Setting a message to '' disables it (empty string).
# • Removing a config entry causes the plugin to fall back to its internal default.
#   (Only remove entries intentionally, as defaults may change between versions.)
# • Identifiers should be unique and contain no spaces.
#
# ─────────────────────────────────────────────────────────────────────────────
# 🗂 Categories
# ─────────────────────────────────────────────────────────────────────────────
# Categories are optional and extend the existing VoteShop.
# Old shop configs still work exactly the same.
#
# To create a category button in the main shop:
#
# Shop:
#   Blocks:
#     Category: 'Blocks'
#     DisplayItem:
#       Material: CHEST
#       Name: '&bBlocks'
#
# Then define the category contents under:
#
# Categories:
#   Blocks:
#     Name: '&bBlocks'
#     Shop:
#       ItemIdentifier:
#         ...
#
# If a Shop entry has Category set, clicking it will open that category
# instead of purchasing an item.
#
# ─────────────────────────────────────────────────────────────────────────────
# 🖼 DisplayItem
# ─────────────────────────────────────────────────────────────────────────────
# DisplayItem is the preferred place for GUI item display settings.
#
# Example:
#
# DisplayItem:
#   Material: DIAMOND
#   Amount: 1
#   Name: '&4Buy A Diamond'
#   Lore:
#     - '&c&lCost: &c3 Voting Points'
#
# Older style is still supported:
#
# Material: DIAMOND
# Amount: 1
# Name: '&4Buy A Diamond'
# Lore:
#   - '&c&lCost: &c3 Voting Points'
#
# If DisplayItem is missing the plugin will automatically fall back
# to the older format.
#
####################################################################################################

VoteShop:
  Enabled: true
  Name: 'VoteShop'
  # Backbutton for main voteshop
  BackButton: true
  HideLimitedReached: true
  LimitReached: '&aYou reached your limit'
  RequireConfirmation: false
  Disabled: '&cVote shop disabled'
  ReopenGUIOnPurchase: false
  # Default back button for category pages (can be overridden per category)
  BackButtonItem:
    Material: BARRIER
    Amount: 1
    Name: '&cBack'
    Slot: -2 # Sets to last slot

Shop:
  Diamond:
    Identifier_Name: 'Diamond'
    DisplayItem:
      Material: DIAMOND
      Amount: 1
      Name: '&4Buy A Diamond'
      Lore:
        - '&c&lCost: &c3 Voting Points'
    Cost: 3
    Permission: ''
    HideOnNoPermission: true
    CloseGUI: true
    RequireConfirmation: false
    Rewards:
      Items:
        Diamond:
          Material: DIAMOND
          Amount: 1

  Blocks:
    Category: 'Blocks'
    DisplayItem:
      Material: CHEST
      Amount: 1
      Name: '&bBlocks'
      Lore:
        - '&7Open block rewards'
    Permission: ''
    HideOnNoPermission: true

Categories:
  Blocks:
    Name: '&bBlocks'
    BackButton: true
    BackButtonItem:
      Material: BARRIER
      Amount: 1
      Slot: -2 # Sets to last slot
      Name: '&cBack'
      Lore:
        - '&7Return to VoteShop'
    Shop:
      Emerald:
        Identifier_Name: 'Emerald'
        DisplayItem:
          Material: EMERALD
          Amount: 1
          Name: '&aBuy An Emerald'
          Lore:
            - '&c&lCost: &c5 Voting Points'
        Cost: 5
        Permission: ''
        HideOnNoPermission: true
        CloseGUI: true
        RequireConfirmation: false
        Rewards:
          Items:
            Emerald:
              Material: EMERALD
              Amount: 1

      Stone:
        Identifier_Name: 'Stone'
        Material: STONE
        Amount: 16
        Name: '&7Buy Stone'
        Lore:
          - '&c&lCost: &c1 Voting Point'
        Cost: 1
        Permission: ''
        HideOnNoPermission: true
        CloseGUI: true
        RequireConfirmation: false
        Rewards:
          Items:
            Stone:
              Material: STONE
              Amount: 16

ShopConfirmPurchase:
  # Use dialog instead of GUI
  UseDialog: false
  Title: 'Confirm Purchase?'
  YesItem:
    Material: EMERALD_BLOCK
    Amount: 1
    Name: '&aYes'
  NoItem:
    Material: BARRIER
    Amount: 1
    Name: '&cNo'
